services:

  api-gateway:
    build: ./services/api_gateway
    container_name: api-gateway
    ports:
      - "8000:5000"
    depends_on:
      - model-service

  model-service:
    build: ./services/model_service
    container_name: model-service
    ports:
      - "8001:8001"

    volumes:
      - ./artifacts:/artifacts