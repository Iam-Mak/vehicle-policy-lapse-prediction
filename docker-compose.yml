services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile

    container_name: api-gateway

    ports:
      - "8000:5000"

    depends_on:
      - model-service

  model-service:
    build:
      context: .
      dockerfile: services/model_service/Dockerfile

    container_name: model-service

    ports:
      - "8001:8001"

    volumes:
      - ./artifacts:/app/artifacts
