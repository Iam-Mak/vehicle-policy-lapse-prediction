name: Deploy Applications

on:
    push:
        branches:
            - feature/azure-container-apps
        paths:
            - "services/**"
            - "infra/applications/**"

    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: .

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Login to Azure Container Registry
              run: |
                  az acr login --name vehiclelapseacr12345

            - name: Build model-service image
              run: |
                  docker build \
                    --platform linux/amd64 \
                    -t vehiclelapseacr12345.azurecr.io/model-service:v1 \
                    -f services/model_service/Dockerfile .

            - name: Push model-service image
              run: |
                  docker push vehiclelapseacr12345.azurecr.io/model-service:v1

            - name: Build api-gateway image
              run: |
                  docker build \
                    --platform linux/amd64 \
                    -t vehiclelapseacr12345.azurecr.io/api-gateway:v1 \
                    -f services/api_gateway/Dockerfile .

            - name: Push api-gateway image
              run: |
                  docker push vehiclelapseacr12345.azurecr.io/api-gateway:v1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: 1.13.0

            - name: Terraform Init
              working-directory: infra/applications
              run: terraform init

            - name: Terraform Validate
              working-directory: infra/applications
              run: terraform validate

            - name: Terraform Plan
              working-directory: infra/applications
              run: terraform plan

            - name: Terraform Apply
              working-directory: infra/applications
              run: terraform apply -auto-approve
