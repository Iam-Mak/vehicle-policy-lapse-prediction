name: CI - Run Tests

on:
  push:
    branches: [ test-branch ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          pip install -e .

      - name: Run tests
        run: |
          pytest